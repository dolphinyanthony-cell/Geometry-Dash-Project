<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GD Clone (Working)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
}
button {
  padding:8px 12px;
  margin-right:5px;
  background:#333;
  border:none;
  color:white;
  cursor:pointer;
}
button:hover { background:#555; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let gravity = 0.6;
let jumpForce = -12;
let speed = 6;

let score = 0;
let gameOver = false;
let started = false;

let audioCtx;
let musicOn = true;
let beatInterval;

// ---- SIMPLE BUILT-IN MUSIC ----
function startMusic() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  if (beatInterval) return;

  beatInterval = setInterval(() => {
    if (!musicOn || gameOver) return;

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = 200 + Math.random() * 50;
    gain.gain.value = 0.08;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.1);
  }, 250);
}

function stopMusic() {
  clearInterval(beatInterval);
  beatInterval = null;
}

// ---- PLAYER ----
class Player {
  constructor() {
    this.x = 150;
    this.y = canvas.height - 150;
    this.size = 40;
    this.velY = 0;
    this.onGround = false;
    this.rotation = 0;
  }

  update() {
    this.velY += gravity;
    this.y += this.velY;

    if (this.y + this.size >= canvas.height - 100) {
      this.y = canvas.height - 100 - this.size;
      this.velY = 0;
      this.onGround = true;
      this.rotation = 0;
    } else {
      this.onGround = false;
      this.rotation += 0.1;
    }
  }

  draw() {
    ctx.save();
    ctx.translate(this.x + this.size/2, this.y + this.size/2);
    ctx.rotate(this.rotation);
    ctx.fillStyle = "#0ff";
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }

  jump() {
    if (this.onGround && !gameOver && started) {
      this.velY = jumpForce;
    }
  }
}

// ---- OBSTACLE ----
class Obstacle {
  constructor(x) {
    this.x = x;
    this.width = 40;
    this.height = 60;
    this.y = canvas.height - 100 - this.height;
  }

  update() {
    this.x -= speed;
  }

  draw() {
    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.height);
    ctx.lineTo(this.x + this.width/2, this.y);
    ctx.lineTo(this.x + this.width, this.y + this.height);
    ctx.closePath();
    ctx.fill();
  }
}

let player, obstacles, frame;

function init() {
  player = new Player();
  obstacles = [];
  frame = 0;
  score = 0;
  gameOver = false;
  started = false;
  stopMusic();
}

// ---- GAME LOGIC ----
function spawnObstacle() {
  if (frame % 100 === 0) {
    obstacles.push(new Obstacle(canvas.width));
  }
}

function collide(p, o) {
  return (
    p.x < o.x + o.width &&
    p.x + p.size > o.x &&
    p.y < o.y + o.height &&
    p.y + p.size > o.y
  );
}

function update() {
  if (!started || gameOver) return;

  frame++;
  score++;

  player.update();
  spawnObstacle();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    let o = obstacles[i];
    o.update();

    if (collide(player, o)) {
      gameOver = true;
      stopMusic();
    }

    if (o.x + o.width < 0) {
      obstacles.splice(i, 1);
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#222";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  player.draw();
  obstacles.forEach(o => o.draw());

  if (!started) {
    ctx.fillStyle = "white";
    ctx.font = "40px Arial";
    ctx.fillText("CLICK OR PRESS SPACE", canvas.width/2 - 220, canvas.height/2);
  }

  if (gameOver) {
    ctx.fillStyle = "white";
    ctx.font = "50px Arial";
    ctx.fillText("GAME OVER", canvas.width/2 - 150, canvas.height/2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ---- INPUT ----
function startEverything() {
  if (!started) {
    started = true;
    startMusic();
  }
}

window.addEventListener("mousedown", () => {
  startEverything();
  player.jump();
});

window.addEventListener("keydown", e => {
  if (e.code === "Space") {
    e.preventDefault();
    startEverything();
    player.jump();
  }
});

// ---- UI ----
document.getElementById("restartBtn").onclick = () => {
  init();
};

document.getElementById("musicBtn").onclick = function() {
  musicOn = !musicOn;
  this.innerText = "Music: " + (musicOn ? "ON" : "OFF");
};

// ---- START ----
init();
loop();
</script>

</body>
</html>
