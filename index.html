<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Dash Style Clone (With Music)</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; color:white; z-index:10; }
button { padding:8px 12px; background:#333; border:none; color:white; cursor:pointer; margin-right:5px; }
button:hover { background:#555; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div id="score">Score: 0</div>
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let gravity = 0.6;
let jumpForce = -12;
let speed = 6;
let score = 0;
let gameOver = false;

// ---- MUSIC SYSTEM (Web Audio API) ----
let audioCtx = null;
let musicOn = true;
let beatInterval = null;

function startMusic(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  if(beatInterval) return;

  beatInterval = setInterval(()=>{
    if(!musicOn) return;

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();

    osc.type = 'square';
    osc.frequency.value = 220 + Math.random()*40;

    gain.gain.value = 0.1;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.08);
  }, 250);
}

function toggleMusic(){
  musicOn = !musicOn;
  document.getElementById('musicBtn').innerText = 'Music: ' + (musicOn ? 'ON' : 'OFF');
}

class Player {
  constructor(){
    this.x = 150;
    this.y = canvas.height - 150;
    this.size = 40;
    this.velY = 0;
    this.onGround = false;
    this.rotation = 0;
  }

  update(){
    this.velY += gravity;
    this.y += this.velY;

    if(this.y + this.size >= canvas.height - 100){
      this.y = canvas.height - 100 - this.size;
      this.velY = 0;
      this.onGround = true;
      this.rotation = 0;
    } else {
      this.onGround = false;
      this.rotation += 0.1;
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x + this.size/2, this.y + this.size/2);
    ctx.rotate(this.rotation);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }

  jump(){
    if(this.onGround && !gameOver){
      this.velY = jumpForce;
    }
  }
}

class Obstacle {
  constructor(x){
    this.x = x;
    this.width = 40;
    this.height = 40 + Math.random()*40;
    this.y = canvas.height - 100 - this.height;
  }

  update(){ this.x -= speed; }

  draw(){
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.height);
    ctx.lineTo(this.x + this.width/2, this.y);
    ctx.lineTo(this.x + this.width, this.y + this.height);
    ctx.closePath();
    ctx.fill();
  }
}

let player, obstacles, frame;

function init(){
  player = new Player();
  obstacles = [];
  frame = 0;
  score = 0;
  gameOver = false;
}

function spawnObstacle(){
  if(frame % 90 === 0){
    obstacles.push(new Obstacle(canvas.width));
  }
}

function detectCollision(p,o){
  return (
    p.x < o.x + o.width &&
    p.x + p.size > o.x &&
    p.y < o.y + o.height &&
    p.y + p.size > o.y
  );
}

function drawGround(){
  ctx.fillStyle = '#222';
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
}

function update(){
  if(gameOver) return;

  frame++;
  score++;

  player.update();
  spawnObstacle();

  for(let i=obstacles.length-1;i>=0;i--){
    let o = obstacles[i];
    o.update();

    if(detectCollision(player,o)){
      gameOver = true;
    }

    if(o.x + o.width < 0){
      obstacles.splice(i,1);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGround();
  player.draw();
  obstacles.forEach(o=>o.draw());

  document.getElementById('score').innerText = 'Score: ' + score;

  if(gameOver){
    ctx.fillStyle='white';
    ctx.font='50px Arial';
    ctx.fillText('GAME OVER', canvas.width/2 - 150, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown', e=>{
  if(e.code === 'Space'){
    e.preventDefault();
    startMusic();
    player.jump();
  }
});

window.addEventListener('mousedown', ()=>{
  startMusic();
  player.jump();
});

const btn = document.getElementById('restartBtn');
btn.addEventListener('click', (e)=>{
  e.stopPropagation();
  init();
});

const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', toggleMusic);

init();
loop();
</script>
</body>
</html>
