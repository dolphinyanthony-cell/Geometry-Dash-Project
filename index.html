<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Clone (Fixed Version)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#333; color:white; border:none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();


// =====================
// GAME SETTINGS
// =====================
let gravity = 0.45;
let baseJumpForce = -11.5;
let speed = 3.8;

let gameOver = false;
let started = false;


// =====================
// SCORE (FIXED POSITION)
// =====================
let score = 0;
let scoreTick = 0;


// =====================
// MUSIC (FIXED CHROME AUDIO)
// =====================
let audioCtx;
let musicOn = true;
let musicRunning = false;
let loopInterval = null;

let songTime = 0;
let lastUpdateTime = 0;


// =====================
// FIX: JUMP (NO RANDOM BUGGY FEELING)
// =====================
function getJumpForce(){
  return baseJumpForce;
}


// =====================
// INPUT (SPACE FIXED)
// =====================
window.addEventListener("keydown", (e)=>{
  if(e.code === "Space"){
    e.preventDefault();
    startAll();
    player.jump();
  }
});

addEventListener("mousedown", ()=>{
  startAll();
  player.jump();
});


// =====================
// MUSIC FIX (AUTO START SAFELY)
// =====================
function playNote(freq, dur, type="sawtooth", vol=0.1){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();

  o.type = type;
  o.frequency.value = freq;

  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + dur);
}

function startMusic(){
  if(musicRunning) return;

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  musicRunning = true;
  lastUpdateTime = performance.now();

  loopInterval = setInterval(()=>{
    if(!musicOn || gameOver) return;

    let now = performance.now();
    songTime += (now - lastUpdateTime) / 1000;
    lastUpdateTime = now;

    let tempo = 130;
    let beat = 60 / tempo;
    let step = Math.floor(songTime / beat) % 16;

    if(step % 4 === 0){
      playNote(220, 0.25, "sawtooth", 0.05);
      playNote(330, 0.25, "sawtooth", 0.05);
    }

    playNote(523 + (step % 3) * 25, 0.10, "triangle", 0.08);

  }, 110);
}

function stopMusic(){
  musicRunning = false;
  clearInterval(loopInterval);
  loopInterval = null;
}


// =====================
// PLAYER (FIXED STRAIGHT ROTATION)
// =====================
class Player{
  constructor(){
    this.x = 150;
    this.y = canvas.height - 150;
    this.s = 40;
    this.vy = 0;
    this.g = false;
    this.r = 0;
  }

  update(){
    this.vy += gravity;
    this.y += this.vy;

    // LANDING RESET (fix crooked rotation bug)
    if(this.y + this.s >= canvas.height - 100){
      this.y = canvas.height - 100 - this.s;
      this.vy = 0;
      this.g = true;
      this.r = 0; // reset rotation cleanly
    } else {
      this.g = false;
      this.r += 0.06; // smooth air spin only
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x + 20, this.y + 20);
    ctx.rotate(this.r);
    ctx.fillStyle = "#0ff";
    ctx.fillRect(-20, -20, 40, 40);
    ctx.restore();
  }

  jump(){
    if(this.g && started && !gameOver){
      this.vy = getJumpForce();
    }
  }
}


// =====================
// OBSTACLES
// =====================
class Obstacle{
  constructor(x){
    this.x = x;
    this.w = 40;
    this.h = 60;
    this.y = canvas.height - 100 - this.h;
  }

  update(){
    this.x -= speed;
  }

  draw(){
    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.h);
    ctx.lineTo(this.x + this.w/2, this.y);
    ctx.lineTo(this.x + this.w, this.y + this.h);
    ctx.fill();
  }
}


// =====================
// GAME STATE
// =====================
let player, obs;

function init(){
  player = new Player();
  obs = [];
  gameOver = false;
  started = false;

  score = 0;
  scoreTick = 0;

  stopMusic();
  songTime = 0;
}

function startAll(){
  if(!started){
    started = true;

    // FIX: Chrome audio unlock
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(musicOn) startMusic();
  }
}


// =====================
// LOOP
// =====================
function update(){
  if(!started || gameOver) return;

  player.update();

  scoreTick++;
  if(scoreTick >= 6){
    score++;
    scoreTick = 0;
  }

  if(Math.random() < 0.02){
    obs.push(new Obstacle(canvas.width));
  }

  for(let i = obs.length - 1; i >= 0; i--){
    let o = obs[i];
    o.update();

    let hit =
      player.x < o.x + o.w &&
      player.x + 40 > o.x &&
      player.y < o.y + o.h &&
      player.y + 40 > o.y;

    if(hit){
      gameOver = true;
      stopMusic();
    }

    if(o.x + o.w < 0){
      obs.splice(i,1);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#222";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  player.draw();
  obs.forEach(o=>o.draw());

  // SCORE (FIXED LEFT SIDE)
  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.textAlign = "left";
  ctx.fillText("Score: " + score, 20, 50);

  if(!started){
    ctx.fillText("CLICK OR SPACE TO START", canvas.width/2 - 200, canvas.height/2);
  }

  if(gameOver){
    ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}


// =====================
// BUTTONS
// =====================
restartBtn.onclick = ()=>init();

musicBtn.onclick = function(){
  musicOn = !musicOn;
  this.innerText = "Music: " + (musicOn ? "ON" : "OFF");

  if(musicOn && started && !gameOver){
    startMusic();
  } else {
    stopMusic();
  }
};


// START
init();
loop();

</script>

</body>
</html>
