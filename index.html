<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Clone (Designed Background)</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#222; color:#0ff; border:none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

let gravity = 0.6;
let jumpForce = -12;
let speed = 6;

let gameOver = false;
let started = false;

// ===== SCORE =====
let score = 0;
let scoreTick = 0;

// ===== BACKGROUND =====
let bgOffset = 0;

// generate shapes once
let shards = [];
for(let i=0;i<30;i++){
  shards.push({
    x: Math.random()*2000,
    y: Math.random()*canvas.height,
    size: 20 + Math.random()*60,
    speed: 0.2 + Math.random()*0.5
  });
}

function drawShard(x,y,size){
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + size/2, y - size);
  ctx.lineTo(x + size, y);
  ctx.lineTo(x + size/2, y + size*0.4);
  ctx.closePath();
  ctx.fill();
}

function drawBackground(){
  bgOffset += speed;

  // deep gradient
  let grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,"#020617");
  grad.addColorStop(1,"#020617");
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // BACK LAYER (slow)
  ctx.fillStyle = "rgba(0,255,255,0.08)";
  shards.forEach(s=>{
    let x = (s.x - bgOffset * s.speed * 0.3) % (canvas.width + 200);
    drawShard(x, s.y*0.5, s.size);
  });

  // MID LAYER
  ctx.fillStyle = "rgba(0,255,255,0.15)";
  shards.forEach(s=>{
    let x = (s.x - bgOffset * s.speed * 0.6) % (canvas.width + 200);
    drawShard(x, s.y*0.7, s.size*0.7);
  });

  // FRONT LAYER
  ctx.fillStyle = "rgba(0,255,255,0.25)";
  shards.forEach(s=>{
    let x = (s.x - bgOffset * s.speed) % (canvas.width + 200);
    drawShard(x, s.y, s.size*0.5);
  });

  // glowing line
  ctx.strokeStyle = "rgba(0,255,255,0.5)";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height - 100);
  ctx.lineTo(canvas.width, canvas.height - 100);
  ctx.stroke();
}

// ===== MUSIC (simple) =====
let audioCtx;
let musicOn = true;
let loop;

function playNote(freq){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();
  o.type = "sawtooth";
  o.frequency.value = freq;

  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);

  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.2);
}

function startMusic(){
  if(loop) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();

  loop = setInterval(()=>{
    if(!musicOn || gameOver) return;
    playNote(200 + Math.random()*400);
  },150);
}

function stopMusic(){
  clearInterval(loop);
  loop = null;
}

// ===== COLLISION =====
function pointInTriangle(px, py, ax, ay, bx, by, cx, cy) {
  const area = (x1,y1,x2,y2,x3,y3) =>
    Math.abs((x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2);

  let A = area(ax,ay,bx,by,cx,cy);
  let A1 = area(px,py,bx,by,cx,cy);
  let A2 = area(ax,ay,px,py,cx,cy);
  let A3 = area(ax,ay,bx,by,px,py);

  return Math.abs(A - (A1 + A2 + A3)) < 0.5;
}

// ===== GAME =====
class Player{
  constructor(){
    this.x=150; this.y=canvas.height-150; this.s=40; this.vy=0; this.g=false; this.r=0;
  }
  update(){
    this.vy+=gravity; this.y+=this.vy;
    if(this.y+this.s>=canvas.height-100){
      this.y=canvas.height-100-this.s;
      this.vy=0; this.g=true; this.r=0;
    } else { this.g=false; this.r+=0.1; }
  }
  draw(){
    ctx.save();
    ctx.translate(this.x+20,this.y+20);
    ctx.rotate(this.r);
    ctx.fillStyle="#0ff";
    ctx.fillRect(-20,-20,40,40);
    ctx.restore();
  }
  jump(){ if(this.g && started && !gameOver) this.vy=jumpForce; }
}

class Obstacle{
  constructor(x){
    this.x=x; this.w=40; this.h=60; this.y=canvas.height-100-this.h;
  }
  update(){ this.x-=speed; }
  draw(){
    ctx.fillStyle="#0ff";
    ctx.beginPath();
    ctx.moveTo(this.x,this.y+this.h);
    ctx.lineTo(this.x+this.w/2,this.y);
    ctx.lineTo(this.x+this.w,this.y+this.h);
    ctx.fill();
  }
}

let player,obs,frame;

function init(){
  player=new Player(); obs=[]; frame=0;
  gameOver=false; started=false;
  stopMusic();
  score=0; scoreTick=0;
}

function update(){
  if(!started||gameOver) return;

  frame++; player.update();

  scoreTick++;
  if(scoreTick>=5){ score++; scoreTick=0; }

  if(frame%100===0) obs.push(new Obstacle(canvas.width));

  for(let i=obs.length-1;i>=0;i--){
    let o=obs[i]; o.update();

    let ax=o.x, ay=o.y+o.h;
    let bx=o.x+o.w/2, by=o.y;
    let cx=o.x+o.w, cy=o.y+o.h;

    let corners=[
      [player.x,player.y],
      [player.x+40,player.y],
      [player.x,player.y+40],
      [player.x+40,player.y+40]
    ];

    for(let [px,py] of corners){
      if(pointInTriangle(px,py,ax,ay,bx,by,cx,cy)){
        gameOver=true;
        stopMusic();
      }
    }

    if(o.x+o.w<0) obs.splice(i,1);
  }
}

function draw(){
  drawBackground();

  player.draw();
  obs.forEach(o=>o.draw());

  ctx.fillStyle="#022";
  ctx.fillRect(0,canvas.height-100,canvas.width,100);

  ctx.fillStyle="white";
  ctx.font="bold 30px Arial";
  ctx.textAlign="right";
  ctx.fillText("Score: "+score,canvas.width-20,50);
  ctx.textAlign="left";

  if(!started){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("CLICK TO START",canvas.width/2-170,canvas.height/2);
  }

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="50px Arial";
    ctx.fillText("GAME OVER",canvas.width/2-150,canvas.height/2);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function startAll(){
  if(!started){
    started=true;
    if(musicOn) startMusic();
  }
}

addEventListener("mousedown",()=>{ startAll(); player.jump(); });
addEventListener("keydown",e=>{
  if(e.code==="Space"){ e.preventDefault(); startAll(); player.jump(); }
});

restartBtn.onclick=()=>init();

musicBtn.onclick=function(){
  musicOn=!musicOn;
  this.innerText="Music: "+(musicOn?"ON":"OFF");

  if(musicOn && started && !gameOver){
    startMusic();
  } else {
    stopMusic();
  }
};

init(); loop();
</script>

</body>
</html>
