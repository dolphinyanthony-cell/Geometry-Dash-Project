<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Clone (With End)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#333; color:white; border:none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

let gravity = 0.6;
let jumpForce = -12;
let speed = 6;

let gameOver = false;
let started = false;
let levelComplete = false;

// SCORE / END
let score = 0;
let scoreTick = 0;
const endScore = 300;

// ===== MUSIC =====
let audioCtx;
let musicOn = true;
let musicRunning = false;
let loopInterval = null;

let songTime = 0;
let lastUpdateTime = 0;

// =====================
// SPACE / INPUT
// =====================
window.addEventListener("keydown", (e)=>{
  if(e.code === "Space"){
    e.preventDefault();
    startAll();
    player.jump();
  }
});

// =====================
// MUSIC (unchanged)
// =====================
function playNote(freq, dur, type="sawtooth", vol=0.1){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();

  o.type = type;
  o.frequency.value = freq;

  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + dur);
}

const chords = [
  [261.6,311.1,392.0],
  [207.7,261.6,311.1],
  [233.1,293.7,349.2],
  [261.6,311.1,392.0]
];

const melody = [523,587,659,698,659,587,523,659,784,880,784,659];

function startMusic(){
  if(musicRunning) return;

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  musicRunning = true;
  lastUpdateTime = performance.now();

  loopInterval = setInterval(()=>{
    if(!musicOn || gameOver) return;

    let now = performance.now();
    songTime += (now - lastUpdateTime) / 1000;
    lastUpdateTime = now;

    let tempo = 140;
    let beat = 60 / tempo;
    let step = Math.floor(songTime / beat) % 16;

    if(step % 4 === 0){
      let chord = chords[Math.floor(step/4)%chords.length];
      chord.forEach(n => playNote(n, 0.4, "sawtooth", 0.06));
    }

    let note = melody[step % melody.length];
    playNote(note, 0.15, "triangle", 0.1);

  }, 100);
}

function stopMusic(){
  musicRunning = false;
  if(loopInterval){
    clearInterval(loopInterval);
    loopInterval = null;
  }
}

// =====================
// COLLISION
// =====================
function pointInTriangle(px, py, ax, ay, bx, by, cx, cy){
  const area = (x1,y1,x2,y2,x3,y3)=>
    Math.abs((x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2);

  let A = area(ax,ay,bx,by,cx,cy);
  let A1 = area(px,py,bx,by,cx,cy);
  let A2 = area(ax,ay,px,py,cx,cy);
  let A3 = area(ax,ay,bx,by,px,py);

  return Math.abs(A-(A1+A2+A3))<0.5;
}

// =====================
// FINISH LINE
// =====================
const finishX = 6000; // distance to win

function drawFinish(){
  let screenX = finishX - cameraX;

  ctx.fillStyle = "#0ff";
  ctx.fillRect(screenX, canvas.height - 200, 10, 200);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("FINISH", screenX - 20, canvas.height - 210);
}

// =====================
// CAMERA
// =====================
let cameraX = 0;

// =====================
// GAME
// =====================
class Player{
  constructor(){
    this.x = 150;
    this.y = canvas.height - 150;
    this.s = 40;
    this.vy = 0;
    this.g = false;
    this.r = 0;
  }

  update(){
    this.vy += gravity;
    this.y += this.vy;

    if(this.y + this.s >= canvas.height - 100){
      this.y = canvas.height - 100 - this.s;
      this.vy = 0;
      this.g = true;
      this.r = 0;
    } else {
      this.g = false;
      this.r += 0.1;
    }

    cameraX += speed;
  }

  draw(){
    ctx.save();
    ctx.translate(this.x + 20, this.y + 20);
    ctx.rotate(this.r);
    ctx.fillStyle = "#0ff";
    ctx.fillRect(-20, -20, 40, 40);
    ctx.restore();
  }

  jump(){
    if(this.g && started && !gameOver){
      this.vy = jumpForce;
    }
  }
}

class Obstacle{
  constructor(x){
    this.x = x;
    this.w = 40;
    this.h = 60;
    this.y = canvas.height - 100 - this.h;
  }

  update(){
    this.x -= speed;
  }

  draw(){
    let sx = this.x - cameraX;

    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.moveTo(sx, this.y + this.h);
    ctx.lineTo(sx + this.w/2, this.y);
    ctx.lineTo(sx + this.w, this.y + this.h);
    ctx.fill();
  }
}

let player, obs, frame;

function init(){
  player = new Player();
  obs = [];
  frame = 0;

  gameOver = false;
  started = false;
  levelComplete = false;

  score = 0;
  scoreTick = 0;

  cameraX = 0;

  stopMusic();
  songTime = 0;
}

function update(){
  if(!started || gameOver) return;

  frame++;
  player.update();

  scoreTick++;
  if(scoreTick >= 5){
    score++;
    scoreTick = 0;

    if(score >= endScore){
      levelComplete = true;
      gameOver = true;
      stopMusic();
    }
  }

  if(frame % 100 === 0){
    obs.push(new Obstacle(cameraX + canvas.width));
  }

  for(let i = obs.length - 1; i >= 0; i--){
    let o = obs[i];
    o.update();

    let ax = o.x - cameraX;
    let ay = o.y + o.h;

    let bx = o.x - cameraX + o.w/2;
    let by = o.y;

    let cx = o.x - cameraX + o.w;
    let cy = o.y + o.h;

    let corners = [
      [player.x, player.y],
      [player.x+40, player.y],
      [player.x, player.y+40],
      [player.x+40, player.y+40]
    ];

    for(let [px,py] of corners){
      if(pointInTriangle(px,py,ax,ay,bx,by,cx,cy)){
        gameOver = true;
        stopMusic();
      }
    }

    if(o.x - cameraX + o.w < 0){
      obs.splice(i,1);
    }
  }

  if(cameraX >= finishX){
    levelComplete = true;
    gameOver = true;
    stopMusic();
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#222";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  drawFinish();

  player.draw();
  obs.forEach(o=>o.draw());

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.textAlign = "right";
  ctx.fillText("Score: " + score, canvas.width - 20, 50);
  ctx.textAlign = "left";

  if(levelComplete){
    ctx.textAlign = "center";
    ctx.font = "60px Arial";
    ctx.fillText("LEVEL COMPLETE!", canvas.width/2, canvas.height/2);
  }

  if(!started){
    ctx.fillText("CLICK OR SPACE TO START", canvas.width/2 - 200, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

function startAll(){
  if(!started){
    started = true;
    if(musicOn) startMusic();
  }
}

// INPUT
addEventListener("mousedown", ()=>{
  startAll();
  player.jump();
});

restartBtn.onclick = ()=>init();

musicBtn.onclick = function(){
  musicOn = !musicOn;
  this.innerText = "Music: " + (musicOn?"ON":"OFF");

  if(musicOn && started && !gameOver){
    startMusic();
  } else {
    stopMusic();
  }
};

init();
loop();
</script>

</body>
</html>
