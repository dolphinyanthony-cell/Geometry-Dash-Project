<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Clone (Fixed Spike Hitboxes + Faster)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#333; color:white; border:none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();


// =====================
// ⚡ SLIGHTLY FASTER GAME
// =====================
let gravity = 0.5;
let jumpForce = -12;
let speed = 4.5; // faster than before

let gameOver = false;
let started = false;


// =====================
// SCORE
// =====================
let score = 0;
let scoreTick = 0;


// =====================
// MUSIC (unchanged simple)
// =====================
let audioCtx;
let musicOn = true;
let musicRunning = false;
let loopInterval = null;

let songTime = 0;
let lastUpdateTime = 0;


// =====================
// FIXED SPIKE HITBOX (TRUE TRIANGLE COLLISION)
// =====================
function pointInTriangle(px, py, ax, ay, bx, by, cx, cy){
  const area = (x1,y1,x2,y2,x3,y3)=>
    Math.abs((x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2);

  let A = area(ax,ay,bx,by,cx,cy);
  let A1 = area(px,py,bx,by,cx,cy);
  let A2 = area(ax,ay,px,py,cx,cy);
  let A3 = area(ax,ay,bx,by,px,py);

  return Math.abs(A-(A1+A2+A3)) < 0.5;
}


// =====================
// INPUT (SPACE FIXED)
// =====================
window.addEventListener("keydown", (e)=>{
  if(e.code === "Space"){
    e.preventDefault();
    startAll();
    player.jump();
  }
});

addEventListener("mousedown", ()=>{
  startAll();
  player.jump();
});


// =====================
// PLAYER
// =====================
class Player{
  constructor(){
    this.x = 150;
    this.y = canvas.height - 150;
    this.s = 40;
    this.vy = 0;
    this.g = false;
    this.r = 0;
  }

  update(){
    this.vy += gravity;
    this.y += this.vy;

    if(this.y + this.s >= canvas.height - 100){
      this.y = canvas.height - 100 - this.s;
      this.vy = 0;
      this.g = true;
    } else {
      this.g = false;
      this.r += 0.08;
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x + 20, this.y + 20);
    ctx.rotate(this.r);
    ctx.fillStyle = "#0ff";
    ctx.fillRect(-20, -20, 40, 40);
    ctx.restore();
  }

  jump(){
    if(this.g && started && !gameOver){
      this.vy = jumpForce;
    }
  }
}


// =====================
// SPIKE (IMPORTANT FIX)
// =====================
class Spike{
  constructor(x){
    this.x = x;
    this.w = 45;
    this.h = 70;
    this.y = canvas.height - 100 - this.h;
  }

  update(){
    this.x -= speed;
  }

  draw(){
    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.h);
    ctx.lineTo(this.x + this.w/2, this.y);
    ctx.lineTo(this.x + this.w, this.y + this.h);
    ctx.fill();
  }

  // 🔥 EXACT SPIKE HITBOX (NOT RECTANGLE)
  hit(player){
    let ax = this.x;
    let ay = this.y + this.h;

    let bx = this.x + this.w/2;
    let by = this.y;

    let cx = this.x + this.w;
    let cy = this.y + this.h;

    let points = [
      [player.x, player.y],
      [player.x + 40, player.y],
      [player.x, player.y + 40],
      [player.x + 40, player.y + 40]
    ];

    return points.some(([px,py])=>{
      return pointInTriangle(px,py,ax,ay,bx,by,cx,cy);
    });
  }
}


// =====================
// GAME STATE
// =====================
let player, spikes;

function init(){
  player = new Player();
  spikes = [];

  gameOver = false;
  started = false;

  score = 0;
  scoreTick = 0;

  stopMusic();
}


// =====================
// GAME LOOP
// =====================
function update(){
  if(!started || gameOver) return;

  player.update();

  scoreTick++;
  if(scoreTick >= 6){
    score++;
    scoreTick = 0;
  }

  if(Math.random() < 0.02){
    spikes.push(new Spike(canvas.width));
  }

  for(let i = spikes.length - 1; i >= 0; i--){
    let s = spikes[i];
    s.update();

    if(s.hit(player)){
      gameOver = true;
      stopMusic();
    }

    if(s.x + s.w < 0){
      spikes.splice(i,1);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#222";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  player.draw();
  spikes.forEach(s=>s.draw());

  ctx.fillStyle = "white";
  ctx.font = "30px Arial";
  ctx.fillText("Score: " + score, 20, 50);

  if(!started){
    ctx.fillText("CLICK OR SPACE TO START", canvas.width/2 - 200, canvas.height/2);
  }

  if(gameOver){
    ctx.fillText("GAME OVER", canvas.width/2 - 100, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}


// =====================
// START
// =====================
function startAll(){
  if(!started){
    started = true;
    if(musicOn) startMusic();
  }
}


// =====================
// MUSIC (light placeholder)
// =====================
function startMusic(){
  if(musicRunning) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicRunning = true;
}

function stopMusic(){
  musicRunning = false;
}


// =====================
// BUTTONS
// =====================
restartBtn.onclick = ()=>init();

musicBtn.onclick = function(){
  musicOn = !musicOn;
  this.innerText = "Music: " + (musicOn ? "ON" : "OFF");
};


// =====================
// INIT
// =====================
init();
loop();

</script>

</body>
</html>
