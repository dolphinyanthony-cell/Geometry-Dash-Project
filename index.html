<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Clone (Snappy Physics Fix)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#333; color:white; border:none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();


// =====================
// ⚡ SNAPPY PHYSICS (KEY FIX)
// =====================

// 🔥 stronger gravity = less float = no jelly effect
let gravity = 0.85;

// 🔥 slightly stronger jump so it still feels good
let jumpForce = -13.5;

// world speed balanced to match jump arc
let speed = 6.2;

let gameOver = false;
let started = false;


// =====================
// SCORE
// =====================
let score = 0;
let scoreTick = 0;


// =====================
// INPUT
// =====================
window.addEventListener("keydown", (e)=>{
  if(e.code === "Space"){
    e.preventDefault();
    startAll();
    player.jump();
  }
});

addEventListener("mousedown", ()=>{
  startAll();
  player.jump();
});


// =====================
// PLAYER
// =====================
class Player{
  constructor(){
    this.x = 150;
    this.y = canvas.height - 150;
    this.s = 40;
    this.vy = 0;
    this.g = false;
    this.r = 0;
  }

  update(){
    this.vy += gravity;
    this.y += this.vy;

    // tighter ground snap (removes float)
    let ground = canvas.height - 100 - this.s;

    if(this.y >= ground){
      this.y = ground;
      this.vy = 0;
      this.g = true;
      this.r = 0;
    } else {
      this.g = false;
      this.r += 0.08;
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x + 20, this.y + 20);
    ctx.rotate(this.r);
    ctx.fillStyle = "#0ff";
    ctx.fillRect(-20, -20, 40, 40);
    ctx.restore();
  }

  jump(){
    if(this.g && started && !gameOver){
      this.vy = jumpForce;
    }
  }
}


// =====================
// SPIKES
// =====================
class Spike{
  constructor(x){
    this.x = x;
    this.w = 45;
    this.h = 70;
    this.y = canvas.height - 100 - this.h;
  }

  update(){
    this.x -= speed;
  }

  draw(){
    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.h);
    ctx.lineTo(this.x + this.w/2, this.y);
    ctx.lineTo(this.x + this.w, this.y + this.h);
    ctx.fill();
  }

  hit(player){
    let ax = this.x;
    let ay = this.y + this.h;
    let bx = this.x + this.w/2;
    let by = this.y;
    let cx = this.x + this.w;
    let cy = this.y + this.h;

    let pts = [
      [player.x, player.y],
      [player.x+40, player.y],
      [player.x, player.y+40],
      [player.x+40, player.y+40]
    ];

    return pts.some(([px,py])=>{
      return pointInTriangle(px,py,ax,ay,bx,by,cx,cy);
    });
  }
}


// =====================
// TRIANGLE HITBOX
// =====================
function pointInTriangle(px, py, ax, ay, bx, by, cx, cy){
  const area = (x1,y1,x2,y2,x3,y3)=>
    Math.abs((x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2);

  let A = area(ax,ay,bx,by,cx,cy);
  let A1 = area(px,py,bx,by,cx,cy);
  let A2 = area(ax,ay,px,py,cx,cy);
  let A3 = area(ax,ay,bx,by,px,py);

  return Math.abs(A-(A1+A2+A3)) < 0.5;
}


// =====================
// SPAWN (slightly tighter for faster feel)
// =====================
let player, spikes;
let spawnTimer = 0;

let baseGap = 65;

function getSafeGap(){
  let offset = (Math.random() * 10) - 5;
  return Math.max(55, Math.min(75, baseGap + offset));
}

let currentGap = getSafeGap();

function init(){
  player = new Player();
  spikes = [];

  gameOver = false;
  started = false;

  score = 0;
  scoreTick = 0;

  spawnTimer = 0;
  currentGap = getSafeGap();
}

function startAll(){
  if(!started){
    started = true;
  }
}


// =====================
// LOOP
// =====================
function update(){
  if(!started || gameOver) return;

  player.update();

  scoreTick++;
  if(scoreTick >= 3){
    score++;
    scoreTick = 0;
  }

  spawnTimer++;

  if(spawnTimer >= currentGap){
    spikes.push(new Spike(canvas.width));
    spawnTimer = 0;
    currentGap = getSafeGap();
  }

  for(let i = spikes.length - 1; i >= 0; i--){
    let s = spikes[i];
    s.update();

    if(s.hit(player)){
      gameOver = true;
    }

    if(s.x + s.w < 0){
      spikes.splice(i,1);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#222";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  player.draw();
  spikes.forEach(s=>s.draw());

  ctx.fillStyle = "white";
  ctx.font = "bold 42px Arial";
  ctx.textAlign = "right";
  ctx.fillText("Score: " + score, canvas.width - 20, 60);
  ctx.textAlign = "left";

  if(!started){
    ctx.fillText("CLICK OR SPACE TO START", canvas.width/2 - 200, canvas.height/2);
  }

  if(gameOver){
    ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}


// START
init();
loop();

</script>

</body>
</html>
