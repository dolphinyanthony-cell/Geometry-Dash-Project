<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Dash Clone (Clean Start + Music)</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; color:white; z-index:10; }
button { padding:8px 12px; background:#333; border:none; color:white; cursor:pointer; margin-right:5px; }
button:hover { background:#555; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=8-bit-arcade-110623.mp3" type="audio/mpeg">
<audio id="music" loop crossorigin="anonymous">
  <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Komiku/Itch.io/Komiku_-_12_-_Bicycle.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const music = document.getElementById('music');

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let gravity = 0.6;
let jumpForce = -12;
let speed = 6;
let score = 0;
let gameOver = false;
let musicOn = true;
let audioUnlocked = false;
let gameStarted = false;

class Player {
  constructor(){
    this.x = 150;
    this.y = canvas.height - 150;
    this.size = 40;
    this.velY = 0;
    this.onGround = false;
    this.rotation = 0;
  }

  update(){
    this.velY += gravity;
    this.y += this.velY;

    if(this.y + this.size >= canvas.height - 100){
      this.y = canvas.height - 100 - this.size;
      this.velY = 0;
      this.onGround = true;
      this.rotation = 0;
    } else {
      this.onGround = false;
      this.rotation += 0.1;
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x + this.size/2, this.y + this.size/2);
    ctx.rotate(this.rotation);
    ctx.fillStyle = '#0ff';
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }

  jump(){
    if(this.onGround && !gameOver && gameStarted){
      this.velY = jumpForce;
    }
  }
}

class Obstacle {
  constructor(x){
    this.x = x;
    this.width = 40;
    this.height = 60;
    this.y = canvas.height - 100 - this.height;
  }

  update(){ this.x -= speed; }

  draw(){
    ctx.fillStyle = '#f00';
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.height);
    ctx.lineTo(this.x + this.width/2, this.y);
    ctx.lineTo(this.x + this.width, this.y + this.height);
    ctx.closePath();
    ctx.fill();
  }
}

let player, obstacles, frame;

function init(){
  player = new Player();
  obstacles = [];
  frame = 0;
  score = 0;
  gameOver = false;
  gameStarted = false;

  music.pause();
  music.currentTime = 0;
}

function unlockAndStart(){
  if(!audioUnlocked){
    audioUnlocked = true;
    gameStarted = true;

    if(musicOn){
      music.currentTime = 0;
      music.play().catch(()=>{});
    }
  }
}

function spawnObstacle(){
  if(frame % 100 === 0){
    obstacles.push(new Obstacle(canvas.width));
  }
}

function detectCollision(p,o){
  return (
    p.x < o.x + o.width &&
    p.x + p.size > o.x &&
    p.y < o.y + o.height &&
    p.y + p.size > o.y
  );
}

function update(){
  if(!gameStarted || gameOver) return;

  frame++;
  score++;

  player.update();
  spawnObstacle();

  for(let i=obstacles.length-1;i>=0;i--){
    let o = obstacles[i];
    o.update();

    if(detectCollision(player,o)){
      gameOver = true;
      music.pause();
    }

    if(o.x + o.width < 0){
      obstacles.splice(i,1);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#222';
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  player.draw();
  obstacles.forEach(o=>o.draw());

  if(!gameStarted){
    ctx.fillStyle='white';
    ctx.font='40px Arial';
    ctx.fillText('CLICK TO START', canvas.width/2 - 170, canvas.height/2);
  }

  if(gameOver){
    ctx.fillStyle='white';
    ctx.font='50px Arial';
    ctx.fillText('GAME OVER', canvas.width/2 - 150, canvas.height/2);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('mousedown', ()=>{
  unlockAndStart();
  player.jump();
});

window.addEventListener('keydown', e=>{
  if(e.code === 'Space'){
    e.preventDefault();
    unlockAndStart();
    player.jump();
  }
});

// buttons

document.getElementById('restartBtn').addEventListener('click', ()=>{
  init();
});

const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', ()=>{
  musicOn = !musicOn;

  if(musicOn && gameStarted && !gameOver){
    music.play().catch(()=>{});
  } else {
    music.pause();
  }

  musicBtn.innerText = 'Music: ' + (musicOn ? 'ON' : 'OFF');
});

init();
loop();
</script>
</body>
</html>
