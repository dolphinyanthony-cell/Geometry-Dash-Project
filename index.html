<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Clone (Full Song)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#333; color:white; border:none; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
addEventListener("resize", resize); resize();

let gravity=0.6, jumpForce=-12, speed=6;
let gameOver=false, started=false;

// 🎵 FULL MUSIC ENGINE
let audioCtx, musicOn=true, startedMusic=false;

function osc(type,freq,time,dur,vol=0.1){
  let o=audioCtx.createOscillator();
  let g=audioCtx.createGain();

  o.type=type;
  o.frequency.setValueAtTime(freq,time);

  // smooth envelope
  g.gain.setValueAtTime(0.0001,time);
  g.gain.linearRampToValueAtTime(vol,time+0.02);
  g.gain.exponentialRampToValueAtTime(0.0001,time+dur);

  o.connect(g); g.connect(audioCtx.destination);
  o.start(time); o.stop(time+dur);
}

// chords (minor EDM feel)
const prog = [
  [261.6,311.1,392.0], // Cm
  [207.7,261.6,311.1], // Ab
  [233.1,293.7,349.2], // Bb
  [261.6,311.1,392.0]  // Cm
];

// lead melody (more variation)
const lead = [
  523,587,659,698,659,587,523,
  659,784,880,784,659,587,
  523,659,784,880,988,880,784
];

function startMusic(){
  if(startedMusic) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  startedMusic=true;

  let tempo=140;
  let beat=60/tempo;
  let t=audioCtx.currentTime;
  let section=0;

  function loop(){
    if(!musicOn || gameOver) return;

    // INTRO
    if(section===0){
      prog.forEach((chord,i)=>{
        chord.forEach(n=>{
          osc("sine",n,t+i*4*beat,4*beat,0.03);
        });
      });
    }

    // BUILD
    if(section===1){
      prog.forEach((chord,i)=>{
        chord.forEach(n=>{
          osc("triangle",n,t+i*4*beat,4*beat,0.05);
        });
      });
      lead.forEach((n,i)=>{
        osc("square",n,t+i*beat*0.5,0.2,0.07);
      });
    }

    // DROP
    if(section>=2){
      prog.forEach((chord,i)=>{
        chord.forEach(n=>{
          osc("sawtooth",n,t+i*4*beat,4*beat,0.07);
        });
      });

      // bass
      prog.forEach((chord,i)=>{
        osc("square",chord[0]/2,t+i*4*beat,4*beat,0.12);
      });

      // lead
      lead.forEach((n,i)=>{
        osc("triangle",n,t+i*beat*0.4,0.15,0.12);
      });

      // drums
      for(let i=0;i<32;i++){
        let time=t+i*beat;

        // kick
        if(i%4===0){
          let o=audioCtx.createOscillator();
          let g=audioCtx.createGain();
          o.frequency.setValueAtTime(120,time);
          o.frequency.exponentialRampToValueAtTime(40,time+0.1);
          g.gain.setValueAtTime(0.4,time);
          g.gain.exponentialRampToValueAtTime(0.0001,time+0.2);
          o.connect(g); g.connect(audioCtx.destination);
          o.start(time); o.stop(time+0.2);
        }

        // snare
        if(i%4===2){
          let buffer = audioCtx.createBuffer(1,44100,44100);
          let data = buffer.getChannelData(0);
          for(let j=0;j<44100;j++){ data[j]=Math.random()*2-1; }

          let noise = audioCtx.createBufferSource();
          noise.buffer = buffer;

          let g = audioCtx.createGain();
          g.gain.setValueAtTime(0.2,time);
          g.gain.exponentialRampToValueAtTime(0.0001,time+0.2);

          noise.connect(g);
          g.connect(audioCtx.destination);
          noise.start(time);
        }
      }
    }

    // advance sections
    section++;
    if(section>3) section=2; // stay in drop loop

    t += 16*beat;
    setTimeout(loop,16*beat*1000);
  }

  loop();
}

// 🎮 GAME (same)
class Player{
  constructor(){ this.x=150; this.y=canvas.height-150; this.s=40; this.vy=0; this.g=false; this.r=0;}
  update(){
    this.vy+=gravity; this.y+=this.vy;
    if(this.y+this.s>=canvas.height-100){
      this.y=canvas.height-100-this.s;
      this.vy=0; this.g=true; this.r=0;
    } else { this.g=false; this.r+=0.1; }
  }
  draw(){
    ctx.save();
    ctx.translate(this.x+20,this.y+20);
    ctx.rotate(this.r);
    ctx.fillStyle="#0ff";
    ctx.fillRect(-20,-20,40,40);
    ctx.restore();
  }
  jump(){ if(this.g && started && !gameOver) this.vy=jumpForce; }
}

class Obstacle{
  constructor(x){ this.x=x; this.w=40; this.h=60; this.y=canvas.height-100-this.h;}
  update(){ this.x-=speed; }
  draw(){
    ctx.fillStyle="#f00";
    ctx.beginPath();
    ctx.moveTo(this.x,this.y+this.h);
    ctx.lineTo(this.x+20,this.y);
    ctx.lineTo(this.x+40,this.y+this.h);
    ctx.fill();
  }
}

let player,obs,frame;

function init(){
  player=new Player(); obs=[]; frame=0;
  gameOver=false; started=false;
}

function update(){
  if(!started||gameOver) return;
  frame++; player.update();

  if(frame%100===0) obs.push(new Obstacle(canvas.width));

  for(let i=obs.length-1;i>=0;i--){
    let o=obs[i]; o.update();
    if(player.x<o.x+o.w && player.x+40>o.x && player.y<o.y+o.h && player.y+40>o.y){
      gameOver=true;
    }
    if(o.x+o.w<0) obs.splice(i,1);
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#222";
  ctx.fillRect(0,canvas.height-100,canvas.width,100);

  player.draw();
  obs.forEach(o=>o.draw());

  if(!started){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("CLICK TO START",canvas.width/2-170,canvas.height/2);
  }

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="50px Arial";
    ctx.fillText("GAME OVER",canvas.width/2-150,canvas.height/2);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function startAll(){
  if(!started){
    started=true;
    if(musicOn) startMusic();
  }
}

addEventListener("mousedown",()=>{ startAll(); player.jump(); });
addEventListener("keydown",e=>{
  if(e.code==="Space"){ e.preventDefault(); startAll(); player.jump(); }
});

// UI
restartBtn.onclick=()=>init();
musicBtn.onclick=function(){
  musicOn=!musicOn;
  this.innerText="Music: "+(musicOn?"ON":"OFF");
};

init(); loop();
</script>
</body>
</html>
