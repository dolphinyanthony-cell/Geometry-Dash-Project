<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GD Clone (Level End Added)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#333; color:white; border:none; }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();


// =====================
// GAME SETTINGS
// =====================
let gravity = 0.5;
let jumpForce = -12.2;
let speed = 4.4;

let gameOver = false;
let started = false;
let levelComplete = false;


// =====================
// SCORE + END CONDITION
// =====================
let score = 0;
let scoreTick = 0;

// 🎯 RANDOM LEVEL END BETWEEN 600–1000
let levelEnd = Math.floor(600 + Math.random() * 400);


// =====================
// MUSIC (simple safe version)
// =====================
let audioCtx;
let musicOn = true;
let musicRunning = false;
let loopInterval = null;

let songTime = 0;
let lastUpdateTime = 0;


// =====================
// INPUT
// =====================
window.addEventListener("keydown", (e)=>{
  if(e.code === "Space"){
    e.preventDefault();
    startAll();
    player.jump();
  }
});

addEventListener("mousedown", ()=>{
  startAll();
  player.jump();
});


// =====================
// MUSIC
// =====================
function playNote(freq, dur, type="sawtooth", vol=0.08){
  let o = audioCtx.createOscillator();
  let g = audioCtx.createGain();

  o.type = type;
  o.frequency.value = freq;

  g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);

  o.connect(g);
  g.connect(audioCtx.destination);

  o.start();
  o.stop(audioCtx.currentTime + dur);
}

function startMusic(){
  if(musicRunning) return;

  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }

  musicRunning = true;
  lastUpdateTime = performance.now();

  loopInterval = setInterval(()=>{
    if(!musicOn || gameOver || levelComplete) return;

    let now = performance.now();
    songTime += (now - lastUpdateTime) / 1000;
    lastUpdateTime = now;

    let tempo = 132;
    let beat = 60 / tempo;
    let step = Math.floor(songTime / beat) % 16;

    if(step % 4 === 0){
      playNote(220, 0.2);
      playNote(330, 0.2);
    }

    playNote(520 + (step % 3) * 20, 0.1, "triangle", 0.07);

  }, 100);
}

function stopMusic(){
  musicRunning = false;
  clearInterval(loopInterval);
  loopInterval = null;
}


// =====================
// PLAYER
// =====================
class Player{
  constructor(){
    this.x = 150;
    this.y = canvas.height - 150;
    this.s = 40;
    this.vy = 0;
    this.g = false;
    this.r = 0;
  }

  update(){
    this.vy += gravity;
    this.y += this.vy;

    if(this.y + this.s >= canvas.height - 100){
      this.y = canvas.height - 100 - this.s;
      this.vy = 0;
      this.g = true;
      this.r = 0;
    } else {
      this.g = false;
      this.r += 0.06;
    }
  }

  draw(){
    ctx.save();
    ctx.translate(this.x + 20, this.y + 20);
    ctx.rotate(this.r);
    ctx.fillStyle = "#0ff";
    ctx.fillRect(-20, -20, 40, 40);
    ctx.restore();
  }

  jump(){
    if(this.g && started && !gameOver && !levelComplete){
      this.vy = jumpForce;
    }
  }
}


// =====================
// SPIKE
// =====================
class Spike{
  constructor(x){
    this.x = x;
    this.w = 45;
    this.h = 70;
    this.y = canvas.height - 100 - this.h;
  }

  update(){
    this.x -= speed;
  }

  draw(){
    ctx.fillStyle = "#f00";
    ctx.beginPath();
    ctx.moveTo(this.x, this.y + this.h);
    ctx.lineTo(this.x + this.w/2, this.y);
    ctx.lineTo(this.x + this.w, this.y + this.h);
    ctx.fill();
  }

  hit(player){
    let ax = this.x;
    let ay = this.y + this.h;

    let bx = this.x + this.w/2;
    let by = this.y;

    let cx = this.x + this.w;
    let cy = this.y + this.h;

    let pts = [
      [player.x, player.y],
      [player.x+40, player.y],
      [player.x, player.y+40],
      [player.x+40, player.y+40]
    ];

    return pts.some(([px,py])=>{
      return pointInTriangle(px,py,ax,ay,bx,by,cx,cy);
    });
  }
}


// =====================
// TRIANGLE HITBOX
// =====================
function pointInTriangle(px, py, ax, ay, bx, by, cx, cy){
  const area = (x1,y1,x2,y2,x3,y3)=>
    Math.abs((x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2);

  let A = area(ax,ay,bx,by,cx,cy);
  let A1 = area(px,py,bx,by,cx,cy);
  let A2 = area(ax,ay,px,py,cx,cy);
  let A3 = area(ax,ay,bx,by,px,py);

  return Math.abs(A-(A1+A2+A3)) < 0.5;
}


// =====================
// GAME STATE
// =====================
let player, spikes;

let spawnTimer = 0;
let spawnGap = 85;

function init(){
  player = new Player();
  spikes = [];

  gameOver = false;
  started = false;
  levelComplete = false;

  score = 0;
  scoreTick = 0;

  spawnTimer = 0;

  // NEW END EACH RUN
  levelEnd = Math.floor(600 + Math.random() * 400);

  stopMusic();
  songTime = 0;
}

function startAll(){
  if(!started){
    started = true;

    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if(musicOn) startMusic();
  }
}


// =====================
// LOOP
// =====================
function update(){
  if(!started || gameOver || levelComplete) return;

  player.update();

  scoreTick++;
  if(scoreTick >= 5){
    score++;
    scoreTick = 0;
  }

  // =====================
  // 🏁 LEVEL END CHECK
  // =====================
  if(score >= levelEnd){
    levelComplete = true;
    stopMusic();
    return;
  }

  spawnTimer++;
  if(spawnTimer >= spawnGap){
    spikes.push(new Spike(canvas.width));
    spawnTimer = 0;
  }

  for(let i = spikes.length - 1; i >= 0; i--){
    let s = spikes[i];
    s.update();

    if(s.hit(player)){
      gameOver = true;
      stopMusic();
    }

    if(s.x + s.w < 0){
      spikes.splice(i,1);
    }
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#222";
  ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

  player.draw();
  spikes.forEach(s=>s.draw());

  // SCORE
  ctx.fillStyle = "white";
  ctx.font = "bold 42px Arial";
  ctx.textAlign = "right";
  ctx.fillText("Score: " + score, canvas.width - 20, 60);
  ctx.textAlign = "left";

  if(!started){
    ctx.fillText("CLICK OR SPACE TO START", canvas.width/2 - 200, canvas.height/2);
  }

  if(gameOver){
    ctx.fillText("GAME OVER", canvas.width/2 - 120, canvas.height/2);
  }

  if(levelComplete){
    ctx.fillStyle = "#00ff99";
    ctx.font = "bold 60px Arial";
    ctx.textAlign = "center";
    ctx.fillText("LEVEL COMPLETE!", canvas.width/2, canvas.height/2);
    ctx.font = "30px Arial";
    ctx.fillText("Score: " + score, canvas.width/2, canvas.height/2 + 50);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}


// =====================
// BUTTONS
// =====================
restartBtn.onclick = ()=>init();

musicBtn.onclick = function(){
  musicOn = !musicOn;
  this.innerText = "Music: " + (musicOn ? "ON" : "OFF");
};


// START
init();
loop();

</script>

</body>
</html>
