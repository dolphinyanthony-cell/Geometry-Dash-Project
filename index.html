<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GD Clone (Custom Music)</title>
<style>
body { margin:0; overflow:hidden; background:#111; }
canvas { display:block; }
#ui { position:absolute; top:10px; left:10px; }
button { padding:8px 12px; margin-right:5px; background:#333; border:none; color:white; cursor:pointer; }
button:hover { background:#555; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui">
  <button id="restartBtn">Restart</button>
  <button id="musicBtn">Music: ON</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener("resize", resize); resize();

let gravity=0.6, jumpForce=-12, speed=6;
let score=0, gameOver=false, started=false;

// 🎵 BETTER MUSIC SYSTEM
let audioCtx, musicOn=true, musicStarted=false;

function playTone(freq, time, duration, type="sawtooth"){
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.type = type;
  osc.frequency.setValueAtTime(freq, time);

  gain.gain.setValueAtTime(0.0001, time);
  gain.gain.exponentialRampToValueAtTime(0.15, time+0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, time+duration);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(time);
  osc.stop(time+duration);
}

// Melody pattern (GD-style)
const melody = [
  440, 660, 550, 660,
  880, 660, 550, 440,
  660, 880, 990, 880
];

function startMusic(){
  if(musicStarted) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  musicStarted=true;

  let tempo=140;
  let beat=60/tempo;
  let t=audioCtx.currentTime;

  function loop(){
    if(!musicOn || gameOver) return;

    melody.forEach((note,i)=>{
      playTone(note, t + i*beat, 0.2);

      // bass
      if(i%2===0){
        playTone(note/2, t + i*beat, 0.3, "square");
      }
    });

    t += melody.length * beat;
    setTimeout(loop, melody.length*beat*1000);
  }

  loop();
}

function stopMusic(){ musicStarted=false; }

// PLAYER
class Player{
  constructor(){ this.x=150; this.y=canvas.height-150; this.size=40; this.velY=0; this.onGround=false; this.rot=0; }
  update(){
    this.velY+=gravity; this.y+=this.velY;
    if(this.y+this.size>=canvas.height-100){
      this.y=canvas.height-100-this.size;
      this.velY=0; this.onGround=true; this.rot=0;
    } else { this.onGround=false; this.rot+=0.1; }
  }
  draw(){
    ctx.save(); ctx.translate(this.x+20,this.y+20); ctx.rotate(this.rot);
    ctx.fillStyle="#0ff"; ctx.fillRect(-20,-20,40,40);
    ctx.restore();
  }
  jump(){ if(this.onGround && started && !gameOver) this.velY=jumpForce; }
}

class Obstacle{
  constructor(x){ this.x=x; this.w=40; this.h=60; this.y=canvas.height-100-this.h; }
  update(){ this.x-=speed; }
  draw(){
    ctx.fillStyle="#f00";
    ctx.beginPath();
    ctx.moveTo(this.x,this.y+this.h);
    ctx.lineTo(this.x+20,this.y);
    ctx.lineTo(this.x+40,this.y+this.h);
    ctx.fill();
  }
}

let player, obstacles, frame;

function init(){
  player=new Player(); obstacles=[]; frame=0; score=0;
  gameOver=false; started=false;
}

function spawn(){ if(frame%100===0) obstacles.push(new Obstacle(canvas.width)); }

function collide(p,o){
  return p.x<o.x+o.w && p.x+40>o.x && p.y<o.y+o.h && p.y+40>o.y;
}

function update(){
  if(!started||gameOver) return;
  frame++; score++;
  player.update(); spawn();

  for(let i=obstacles.length-1;i>=0;i--){
    let o=obstacles[i]; o.update();
    if(collide(player,o)){ gameOver=true; }
    if(o.x+o.w<0) obstacles.splice(i,1);
  }
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#222"; ctx.fillRect(0,canvas.height-100,canvas.width,100);
  player.draw(); obstacles.forEach(o=>o.draw());

  if(!started){
    ctx.fillStyle="white";
    ctx.font="40px Arial";
    ctx.fillText("CLICK TO START",canvas.width/2-170,canvas.height/2);
  }

  if(gameOver){
    ctx.fillStyle="white";
    ctx.font="50px Arial";
    ctx.fillText("GAME OVER",canvas.width/2-150,canvas.height/2);
  }
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }

function startAll(){
  if(!started){
    started=true;
    if(musicOn) startMusic();
  }
}

addEventListener("mousedown",()=>{ startAll(); player.jump(); });
addEventListener("keydown",e=>{ if(e.code==="Space"){ e.preventDefault(); startAll(); player.jump(); }});

// UI
restartBtn.onclick=()=>init();
musicBtn.onclick=function(){
  musicOn=!musicOn;
  this.innerText="Music: "+(musicOn?"ON":"OFF");
};

init(); loop();
</script>
</body>
</html>
